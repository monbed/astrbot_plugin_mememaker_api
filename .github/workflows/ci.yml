name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Check syntax errors (E999) and undefined names (F821)
        run: ruff check --select=E999,F821 .

      - name: Compile all .py files (catch SyntaxError)
        run: python -m compileall -q .
